<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - MSDHacks</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <!-- Navbar -->
    <header id="navbar" class="navbar scrolled">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <span class="logo-main">MSD</span>
                <span class="logo-sub">_Hacks</span>
            </a>

            <nav class="nav-links" id="navLinks">
                <a href="products.html" class="nav-link">Products</a>
            </nav>

            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <button class="btn btn-outline btn-sm" id="loginBtn" onclick="window.location.href='login.html'">Login</button>
            </div>

            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="products.html" class="mobile-menu-link">Products</a>
        <a href="cart.html" class="mobile-menu-link">Cart</a>
        <button class="btn btn-outline w-full" onclick="window.location.href='login.html'">Login</button>
    </div>

    <!-- Main Content -->
    <main style="padding-top: 100px; min-height: 100vh;">
        <div class="container" style="padding-bottom: 4rem;">
            <!-- Back Button -->
            <button onclick="window.history.back()" style="display: flex; align-items: center; gap: 0.5rem; color: var(--color-foreground-secondary); background: none; border: none; cursor: pointer; margin-bottom: 2rem; font-family: var(--font-mono); font-size: 0.875rem; transition: color var(--transition-fast);" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--color-foreground-secondary)'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to vault
            </button>

            <!-- Product Detail -->
            <div id="productDetail" style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start;">
                <!-- Loading state -->
                <div class="loading-container" style="grid-column: 1 / -1;">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 MSDHacks. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
            </div>
        </div>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Get product slug from URL
        const params = getUrlParams();
        const slug = params.slug;

        if (!slug) {
            window.location.href = 'products.html';
        }

        // Load product
        const product = MockData.getProduct(slug);

        if (!product) {
            document.getElementById('productDetail').innerHTML = `
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <div class="empty-state-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                    </div>
                    <h3 class="empty-state-title">Product not found</h3>
                    <p class="empty-state-description">The product you're looking for doesn't exist.</p>
                    <button class="btn btn-primary" onclick="window.location.href='products.html'">Browse Products</button>
                </div>
            `;
        } else {
            // Update page title
            document.title = `${product.name} - MSDHacks`;

            // Render product
            document.getElementById('productDetail').innerHTML = `
                <!-- Left: Image -->
                <div style="position: sticky; top: 100px;">
                    <div style="position: relative; aspect-ratio: 1; background-color: var(--color-background); border: 1px solid var(--color-border); border-radius: 16px; overflow: hidden; box-shadow: 0 0 20px rgba(0, 255, 178, 0.2);">
                        <img src="${product.thumbnailURL}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <div class="card" style="text-align: center; padding: 1rem;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" style="margin: 0 auto 0.5rem;">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            <div style="font-size: 0.875rem; font-weight: 700; margin-bottom: 0.25rem;">Manual Delivery</div>
                            <div style="font-size: 0.75rem; color: var(--color-foreground-muted);">Contact creator for access</div>
                        </div>
                        <div class="card" style="text-align: center; padding: 1rem;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin: 0 auto 0.5rem; color: #fbbf24;">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            <div style="font-size: 0.875rem; font-weight: 700; margin-bottom: 0.25rem;">Top Rated</div>
                            <div style="font-size: 0.75rem; color: var(--color-foreground-muted);">${product.rating} / 5.0 from ${product.reviewCount} users</div>
                        </div>
                    </div>
                </div>

                <!-- Right: Info -->
                <div>
                    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
                        <span class="badge badge-primary">${product.category}</span>
                        ${product.featured ? '<span class="badge" style="background-color: var(--color-primary); color: var(--color-background); border: none; font-weight: 700; box-shadow: 0 0 10px rgba(0, 255, 178, 0.5);">FEATURED</span>' : ''}
                    </div>

                    <h1 style="font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 1rem; font-family: var(--font-heading);">${product.name}</h1>

                    <p style="font-size: 1.125rem; color: var(--color-foreground-secondary); margin-bottom: 2rem; line-height: 1.8;">${product.longDescription}</p>

                    <!-- Price Card -->
                    <div class="card" style="padding: 1.5rem; margin-bottom: 2rem; position: relative; overflow: hidden;">
                        <div style="position: absolute; left: 0; top: 0; width: 4px; height: 100%; background-color: var(--color-primary);"></div>
                        <div style="display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 0.5rem;">
                            <span style="font-size: 2.5rem; font-weight: 700; color: var(--color-primary); font-family: var(--font-heading); text-shadow: 0 0 10px rgba(0, 255, 178, 0.3);">₹${product.discountPrice || product.price}</span>
                            ${product.discountPrice ? '<span style="font-size: 1.25rem; color: var(--color-foreground-muted); text-decoration: line-through; margin-bottom: 0.5rem;">₹' + product.price + '</span>' : ''}
                        </div>
                        <p style="font-size: 0.875rem; color: var(--color-foreground-muted); margin-bottom: 1.5rem;">One-time payment. Lifetime access. Free updates.</p>

                        <div style="display: flex; gap: 1rem;">
                            <button class="btn btn-lg btn-primary" style="flex: 1;" onclick="showBuyModal()">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                </svg>
                                Buy Now
                            </button>
                            <button class="btn btn-lg btn-outline" style="flex: 1;" onclick="showInstructions()">Try Demo</button>
                        </div>
                    </div>

                    <!-- How It Works -->
                    <div class="card" style="padding: 1.5rem; margin-bottom: 2rem;">
                        <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; font-family: var(--font-heading);">📋 How It Works</h3>
                        <ol style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.75rem; font-size: 0.9rem; color: var(--color-foreground-secondary); line-height: 1.6;">
                            <li style="display: flex; gap: 0.75rem;"><span style="color: var(--color-primary); font-weight: 700; min-width: 1.5rem;">1.</span>Load the extension from the zip file in Chrome (chrome://extensions → Developer mode → Load unpacked)</li>
                            <li style="display: flex; gap: 0.75rem;"><span style="color: var(--color-primary); font-weight: 700; min-width: 1.5rem;">2.</span>Use the ID & password given by the creator to activate</li>
                            <li style="display: flex; gap: 0.75rem;"><span style="color: var(--color-primary); font-weight: 700; min-width: 1.5rem;">3.</span>Go to any Examly course video, start it and pause after 1 second</li>
                            <li style="display: flex; gap: 0.75rem;"><span style="color: var(--color-primary); font-weight: 700; min-width: 1.5rem;">4.</span>Click the extension button (bottom right corner)</li>
                            <li style="display: flex; gap: 0.75rem;"><span style="color: var(--color-primary); font-weight: 700; min-width: 1.5rem;">5.</span>Continue watching — each second counts as 1 minute of watch time</li>
                            <li style="display: flex; gap: 0.75rem;"><span style="color: var(--color-primary); font-weight: 700; min-width: 1.5rem;">6.</span>Stop the extension and refresh the page to see updated time</li>
                        </ol>
                        <div style="margin-top: 1rem; padding: 0.75rem; background: rgba(0,255,178,0.08); border-radius: 8px; border: 1px solid rgba(0,255,178,0.15); font-size: 0.85rem; color: var(--color-foreground-secondary);">
                            <strong style="color: var(--color-primary);">💡 Pro tip:</strong> For multiple videos — start video, pause, click extension, watch briefly, stop extension, move to next video. Refresh once at the end to save time.
                        </div>
                    </div>

                    <!-- Details -->
                    <div style="font-size: 0.875rem; border-top: 1px solid var(--color-border); padding-top: 2rem;">
                        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(42, 42, 58, 0.5);">
                            <span style="color: var(--color-foreground-secondary);">Compatibility</span>
                            <span style="font-family: var(--font-mono);">${product.compatibility}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(42, 42, 58, 0.5);">
                            <span style="color: var(--color-foreground-secondary);">Version</span>
                            <span style="font-family: var(--font-mono);">${product.version}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(42, 42, 58, 0.5);">
                            <span style="color: var(--color-foreground-secondary);">Works on</span>
                            <span style="font-family: var(--font-mono);">mbu.examly.io</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0;">
                            <span style="color: var(--color-foreground-secondary);">Rating</span>
                            <span style="font-family: var(--font-mono); color: #fbbf24;">${product.rating} ⭐ (${product.reviewCount} reviews)</span>
                        </div>
                    </div>
                </div>
            `;

            // Buy Modal
            const buyModal = document.createElement('div');
            buyModal.id = 'buyModal';
            buyModal.style.cssText = 'display:none; position:fixed; inset:0; z-index:1000; align-items:center; justify-content:center;';
            buyModal.innerHTML = `
                <div style="position:absolute; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);" onclick="closeBuyModal()"></div>
                <div style="position:relative; background:var(--color-background); border:1px solid var(--color-border); border-radius:16px; padding:2rem; max-width:400px; width:90%; box-shadow:0 0 30px rgba(0,255,178,0.2);">
                    <h3 style="font-size:1.25rem; font-weight:700; margin-bottom:0.5rem; font-family:var(--font-heading);">📞 Contact to Purchase</h3>
                    <p style="font-size:0.875rem; color:var(--color-foreground-secondary); margin-bottom:1.5rem;">Call or message the creator to get your extension zip file and login credentials.</p>
                    <div style="background:rgba(0,255,178,0.06); border:1px solid rgba(0,255,178,0.15); border-radius:12px; padding:1.25rem; margin-bottom:1.5rem;">
                        <div style="margin-bottom:1rem;">
                            <div style="font-size:0.75rem; color:var(--color-foreground-muted); margin-bottom:0.25rem;">Name</div>
                            <div style="font-size:1.1rem; font-weight:700;">${product.contactName || 'Sameer'}</div>
                        </div>
                        <div>
                            <div style="font-size:0.75rem; color:var(--color-foreground-muted); margin-bottom:0.25rem;">Phone</div>
                            <div style="font-size:1.1rem; font-weight:700; color:var(--color-primary);">${product.contactPhone || '+91 89851 37419'}</div>
                        </div>
                    </div>
                    <a href="tel:${(product.contactPhone || '+918985137419').replace(/\s/g, '')}" class="btn btn-primary" style="width:100%; text-align:center; margin-bottom:0.75rem;">
                        📞 Call Now
                    </a>
                    <a href="https://wa.me/${(product.contactPhone || '+918985137419').replace(/[\s+]/g, '')}" target="_blank" class="btn btn-outline" style="width:100%; text-align:center;">
                        💬 WhatsApp
                    </a>
                </div>
            `;
            document.body.appendChild(buyModal);

            // Instructions Modal
            const instrModal = document.createElement('div');
            instrModal.id = 'instrModal';
            instrModal.style.cssText = 'display:none; position:fixed; inset:0; z-index:1000; align-items:center; justify-content:center;';
            instrModal.innerHTML = `
                <div style="position:absolute; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);" onclick="closeInstructions()"></div>
                <div style="position:relative; background:var(--color-background); border:1px solid var(--color-border); border-radius:16px; padding:2rem; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 0 30px rgba(0,255,178,0.2);">
                    <h3 style="font-size:1.25rem; font-weight:700; margin-bottom:1rem; font-family:var(--font-heading);">🚀 Setup Instructions</h3>
                    <ol style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:1rem; font-size:0.9rem; color:var(--color-foreground-secondary); line-height:1.6;">
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">1.</span>Extract the zip file you received from the creator</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">2.</span>Open Chrome and go to chrome://extensions</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">3.</span>Enable "Developer mode" (top right toggle)</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">4.</span>Click "Load unpacked" and select the extracted folder</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">5.</span>Enter the ID and password provided by the creator</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">6.</span>Go to mbu.examly.io and open any course video</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">7.</span>Start the video, pause after 1 second</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">8.</span>Click the extension button (bottom right)</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">9.</span>Watch for X seconds = X minutes of watch time registered</li>
                        <li style="display:flex; gap:0.75rem;"><span style="color:var(--color-primary); font-weight:700; min-width:1.5rem;">10.</span>Stop extension and refresh page to see updated progress</li>
                    </ol>
                    <button class="btn btn-primary" style="width:100%; margin-top:1.5rem;" onclick="closeInstructions()">Got it!</button>
                </div>
            `;
            document.body.appendChild(instrModal);
        }

        function showBuyModal() {
            document.getElementById('buyModal').style.display = 'flex';
        }
        function closeBuyModal() {
            document.getElementById('buyModal').style.display = 'none';
        }
        function showInstructions() {
            document.getElementById('instrModal').style.display = 'flex';
        }
        function closeInstructions() {
            document.getElementById('instrModal').style.display = 'none';
        }
    </script>

    <style>
        @media (max-width: 768px) {
            #productDetail {
                grid-template-columns: 1fr !important;
            }
            #productDetail > div:first-child {
                position: static !important;
            }
        }
    </style>
</body>
</html>
