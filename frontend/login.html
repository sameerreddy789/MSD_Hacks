<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MSDHacks</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <!-- Navbar -->
    <header id="navbar" class="navbar scrolled">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <span class="logo-main">MSD</span>
                <span class="logo-sub">_Hacks</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main style="padding-top: 100px; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="container" style="max-width: 450px;">
            <div class="card" style="padding: 2.5rem;">
                <h1 style="font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; font-family: var(--font-heading);">
                    Welcome to <span style="color: var(--color-primary);">MSDHacks</span>
                </h1>
                <p style="text-align: center; color: var(--color-foreground-secondary); margin-bottom: 2rem;">
                    Sign in to access your vault
                </p>

                <!-- Tabs -->
                <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid var(--color-border);">
                    <button id="loginTab" class="auth-tab active" onclick="switchTab('login')">Login</button>
                    <button id="registerTab" class="auth-tab" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" style="display: block;">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; cursor: pointer;">
                            <input type="checkbox" style="width: 16px; height: 16px;">
                            <span>Remember me</span>
                        </label>
                        <a href="#" style="font-size: 0.875rem; color: var(--color-primary);">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-lg btn-primary w-full" id="loginBtn">
                        <span id="loginBtnText">Login</span>
                        <div id="loginBtnLoader" class="spinner" style="display: none; width: 20px; height: 20px; border-width: 2px;"></div>
                    </button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-input" id="registerName" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="registerEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required>
                        <p style="font-size: 0.75rem; color: var(--color-foreground-muted); margin-top: 0.25rem;">
                            At least 8 characters with uppercase, lowercase, and number
                        </p>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.875rem; cursor: pointer;">
                            <input type="checkbox" style="width: 16px; height: 16px; margin-top: 0.125rem;" required>
                            <span>I agree to the <a href="#" style="color: var(--color-primary);">Terms of Service</a> and <a href="#" style="color: var(--color-primary);">Privacy Policy</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-lg btn-primary w-full" id="registerBtn">
                        <span id="registerBtnText">Create Account</span>
                        <div id="registerBtnLoader" class="spinner" style="display: none; width: 20px; height: 20px; border-width: 2px;"></div>
                    </button>
                </form>

                <!-- Divider -->
                <div style="position: relative; text-align: center; margin: 2rem 0;">
                    <div class="divider"></div>
                    <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--color-surface); padding: 0 1rem; font-size: 0.875rem; color: var(--color-foreground-muted);">
                        OR
                    </span>
                </div>

                <!-- Social Login -->
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <button class="btn btn-outline w-full" onclick="alert('Google login coming soon!')">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>
            </div>
        </div>
    </main>

    <style>
        .auth-tab {
            flex: 1;
            padding: 0.75rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--color-foreground-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .auth-tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .auth-tab:hover:not(.active) {
            color: var(--color-foreground);
        }
    </style>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const btnLoader = document.getElementById('loginBtnLoader');

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            try {
                await Auth.login(email, password);
                Cart.showToast('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'products.html';
                }, 1000);
            } catch (error) {
                Cart.showToast(error.message, 'error');
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });

        // Register form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('registerBtnText');
            const btnLoader = document.getElementById('registerBtnLoader');

            // Validate password
            if (password.length < 8) {
                Cart.showToast('Password must be at least 8 characters', 'error');
                return;
            }

            if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                Cart.showToast('Password must contain uppercase, lowercase, and number', 'error');
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            try {
                await Auth.register(name, email, password);
                Cart.showToast('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'products.html';
                }, 1000);
            } catch (error) {
                Cart.showToast(error.message, 'error');
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });

        // Redirect if already logged in
        if (Auth.isAuthenticated()) {
            window.location.href = 'products.html';
        }
    </script>
</body>
</html>
