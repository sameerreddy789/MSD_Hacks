<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - MSDHacks</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <!-- Navbar -->
    <header id="navbar" class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <span class="logo-main">MSD</span>
                <span class="logo-sub">_Hacks</span>
            </a>

            <nav class="nav-links" id="navLinks">
                <a href="products.html" class="nav-link" style="color: var(--color-primary);">Products</a>
            </nav>

            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <button class="btn btn-outline btn-sm" id="loginBtn" onclick="window.location.href='login.html'">Login</button>
            </div>

            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="products.html" class="mobile-menu-link">Products</a>
        <a href="cart.html" class="mobile-menu-link">Cart</a>
        <button class="btn btn-outline w-full" onclick="window.location.href='login.html'">Login</button>
    </div>

    <!-- Main Content -->
    <main style="padding-top: 100px; min-height: 100vh;">
        <div class="container" style="padding-bottom: 4rem;">
            <!-- Header -->
            <div style="margin-bottom: 3rem;">
                <h1 style="font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; font-family: var(--font-heading);">
                    Unlock the <span style="color: var(--color-primary); text-shadow: 0 0 20px rgba(0, 255, 178, 0.6);">Vault</span>
                </h1>
            </div>

            <!-- Filters -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--color-border);">
                <!-- Category Tabs -->
                <div style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
                    <button class="category-tab active" data-category="All">All</button>
                    <button class="category-tab" data-category="Browser Extensions">Browser Extensions</button>
                    <button class="category-tab" data-category="Productivity Widgets">Productivity Widgets</button>
                    <button class="category-tab" data-category="AI Automation">AI Automation</button>
                    <button class="category-tab" data-category="Templates & Presets">Templates & Presets</button>
                </div>

                <!-- Search and Sort -->
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div style="position: relative; flex: 1; min-width: 250px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--color-foreground-muted);">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input 
                            type="text" 
                            id="searchInput"
                            placeholder="Search tools..." 
                            style="width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: 9999px; color: var(--color-foreground); font-size: 0.875rem;"
                        />
                    </div>
                    <select id="sortSelect" class="form-select" style="width: auto; min-width: 150px; border-radius: 9999px;">
                        <option value="default">Sort by: Featured</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Highest Rated</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="productsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 3rem;">
                <!-- Products will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </div>
                <h3 class="empty-state-title">No products found</h3>
                <p class="empty-state-description">Try adjusting your filters or search terms</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 MSDHacks. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
            </div>
        </div>
    </footer>

    <style>
        .category-tab {
            white-space: nowrap;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-foreground-secondary);
            transition: all var(--transition-base);
            cursor: pointer;
        }

        .category-tab:hover {
            border-color: rgba(0, 255, 178, 0.5);
        }

        .category-tab.active {
            background-color: var(--color-primary);
            color: var(--color-background);
            border-color: var(--color-primary);
            font-weight: 700;
            box-shadow: 0 0 15px rgba(0, 255, 178, 0.4);
        }
    </style>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Products page logic
        let currentFilters = {
            category: 'All',
            search: '',
            sort: 'default'
        };

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');
            const products = MockData.getProducts(currentFilters);

            if (products.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-thumbnail">
                        <img src="${product.thumbnailURL}" alt="${product.name}">
                        ${product.featured ? `
                            <div class="product-badge">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                                </svg>
                                FEATURED
                            </div>
                        ` : ''}
                        <div class="product-category">${product.category}</div>
                    </div>
                    <div class="product-content">
                        <h3 class="product-title">
                            <a href="product-detail.html?slug=${product.slug}" style="color: inherit;">${product.name}</a>
                        </h3>
                        <p class="product-description">${product.description}</p>
                        <div class="product-rating">
                            <svg width="16" height="16" viewBox="0 0 24 24">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            <span>${product.rating.toFixed(1)}</span>
                            <span class="product-rating-count">(${product.reviewCount})</span>
                        </div>
                        <div class="product-footer">
                            <div class="product-price">
                                ${product.discountPrice ? `<span class="product-price-original">₹${product.price}</span>` : ''}
                                <span class="product-price-current">₹${product.discountPrice || product.price}</span>
                            </div>
                        </div>
                        <div class="product-actions">
                            <button class="btn btn-outline btn-sm" onclick="window.location.href='product-detail.html?slug=${product.slug}'">
                                View
                            </button>
                            <button class="btn btn-primary btn-sm" onclick='addToCart(${JSON.stringify(product)})'>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="9" cy="21" r="1"></circle>
                                    <circle cx="20" cy="21" r="1"></circle>
                                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                </svg>
                                Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(product) {
            Cart.add(product);
        }

        // Category filter
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilters.category = tab.dataset.category;
                renderProducts();
            });
        });

        // Search
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', debounce((e) => {
            currentFilters.search = e.target.value;
            renderProducts();
        }, 300));

        // Sort
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentFilters.sort = e.target.value;
            renderProducts();
        });

        // Initial render
        renderProducts();
    </script>
</body>
</html>
